# Build the Mini Program SDK AAR in CI and upload it as an artifact.
#
# Place at .github/workflows/build-aar.yml in the SOURCE repo
# (iQbalADR/mpsdk-source-android), which must contain the full Android
# project (root settings.gradle.kts + build.gradle.kts + gradle/libs.versions.toml
# + gradle.properties + the miniprogramsdk module).
#
# Uses gradle/actions/setup-gradle (provisions Gradle — no committed wrapper
# jar required) + android-actions/setup-android (provisions the SDK). The
# resulting AAR already bundles consumer-rules.pro via consumerProguardFiles.
name: Build AAR

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  aar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3   # sets ANDROID_HOME / SDK

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.9"

      - name: Assemble release AAR
        run: gradle :miniprogramsdk:assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: miniprogramsdk-release-aar
          path: miniprogramsdk/build/outputs/aar/miniprogramsdk-release.aar
          if-no-files-found: error

      # Optional: attach to a GitHub Release when triggered by a v* tag.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release upload "${GITHUB_REF_NAME}" \
               miniprogramsdk/build/outputs/aar/miniprogramsdk-release.aar --clobber
        env:
          GH_TOKEN: ${{ github.token }}
